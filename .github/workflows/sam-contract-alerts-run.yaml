name: sam-contract-alerts-run

on:
  workflow_dispatch:
  schedule:
    - cron: '0 11 * * *'

permissions:
  contents: read

jobs:
  sam-contract-alerts-run:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Install uv
      uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
    - name: Set up Python
      run: uv python install 3.13
    - name: Install dependencies
      run: uv sync --locked
    - name: Run search
      env:
        SAM_API_KEY: ${{ secrets.SAM_API_KEY }}
        CONTRACT_LIST: ${{ secrets.CONTRACT_LIST }}
        NAICS_LIST: ${{ secrets.NAICS_LIST }}
        MS_URL: ${{ secrets.MS_URL }}
      run: uv run python3 search.py "$SAM_API_KEY" "$CONTRACT_LIST" "$NAICS_LIST" "$MS_URL"
